spring:
  application:
    name: gateway
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: auth-service
              uri: http://localhost:8081
              predicates:
                - Path=/auth/**

            - id: account-service
              uri: http://localhost:8082
              predicates:
                - Path=/account/**

            - id: accommodation-service
              uri: http://localhost:8083
              predicates:
                - Path=/accommodation/**

            - id: reservation-service
              uri: http://localhost:8084
              predicates:
                - Path=/reservation/**
server:
  port: 8080